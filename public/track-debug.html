<!DOCTYPE html>
<html>
<head>
<title>Track Debug v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#000;overflow:hidden;font-family:sans-serif;}
#info{position:fixed;top:10px;left:10px;color:white;z-index:999;font-size:12px;background:rgba(0,0,0,0.85);padding:12px;border-radius:8px;max-width:350px;line-height:1.4;}
#btns{position:fixed;bottom:10px;left:10px;z-index:999;display:flex;gap:8px;flex-wrap:wrap;}
#btns button{padding:10px 16px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:13px;}
.btn-tmpl{background:#f0a030;color:black;}
.btn-api{background:#3080f0;color:white;}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">Klikni na tlačítko dole...</div>
<div id="btns">
  <button class="btn-tmpl" onclick="loadTemplate()">📐 Šablona (ověřená)</button>
  <button class="btn-api" onclick="loadFromAPI()">🤖 API (AI)</button>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls;
let trackGroup = null;
const boardW = 2000, boardD = 1000;

// ===== HARDCODED TEMPLATE (simple-oval TT, verified 0mm gap) =====
const TEMPLATE_TRACKS = [
  {pieceId:"tt-g4",x:336,z:190,rotation:0,type:"straight",length:332},
  {pieceId:"tt-g4",x:668,z:190,rotation:0,type:"straight",length:332},
  {pieceId:"tt-g4",x:1000,z:190,rotation:0,type:"straight",length:332},
  {pieceId:"tt-g4",x:1332,z:190,rotation:0,type:"straight",length:332},
  {pieceId:"tt-r1-15",x:1664,z:190,rotation:0,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1744.234,z:200.563,rotation:0.2618,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1819.0,z:231.453,rotation:0.5236,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1883.234,z:280.765,rotation:0.7854,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1932.547,z:345.0,rotation:1.0472,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1963.437,z:419.766,rotation:1.3090,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1974.0,z:500.0,rotation:1.5708,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1963.437,z:580.234,rotation:1.8326,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1932.547,z:655.0,rotation:2.0944,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1883.234,z:719.235,rotation:2.3562,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1819.0,z:768.547,rotation:2.6180,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1744.234,z:799.437,rotation:2.8798,type:"curve",radius:310,angle:15},
  {pieceId:"tt-g4",x:1664.0,z:810.0,rotation:3.1416,type:"straight",length:332},
  {pieceId:"tt-g4",x:1332.0,z:810.0,rotation:3.1416,type:"straight",length:332},
  {pieceId:"tt-g4",x:1000.0,z:810.0,rotation:3.1416,type:"straight",length:332},
  {pieceId:"tt-g4",x:668.0,z:810.0,rotation:3.1416,type:"straight",length:332},
  {pieceId:"tt-r1-15",x:336.0,z:810.0,rotation:3.1416,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:255.766,z:799.437,rotation:3.4034,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:181.0,z:768.547,rotation:3.6652,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:116.766,z:719.235,rotation:3.9270,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:67.453,z:655.0,rotation:4.1888,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:36.563,z:580.234,rotation:4.4506,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:26.0,z:500.0,rotation:4.7124,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:36.563,z:419.766,rotation:4.9742,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:67.453,z:345.0,rotation:5.2360,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:116.766,z:280.765,rotation:5.4978,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:181.0,z:231.453,rotation:5.7596,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:255.766,z:200.563,rotation:6.0214,type:"curve",radius:310,angle:15},
];

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0b14);
  camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 10000);
  camera.position.set(boardW/2, Math.max(boardW,boardD)*0.8, boardD*1.5);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(boardW/2, 0, boardD/2);
  controls.update();
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(boardW, 500, boardD);
  scene.add(dl);
  const dl2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dl2.position.set(-200, 300, -200);
  scene.add(dl2);
  // Board
  const bg = new THREE.BoxGeometry(boardW, 5, boardD);
  const bm = new THREE.MeshStandardMaterial({color:0x2a5a2a});
  const board = new THREE.Mesh(bg, bm);
  board.position.set(boardW/2, -2.5, boardD/2);
  scene.add(board);
  animate();
  window.addEventListener('resize', () => {
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

const railMat = new THREE.MeshStandardMaterial({color:0xc0c0c0, metalness:0.7, roughness:0.3});
const sleeperMat = new THREE.MeshStandardMaterial({color:0x6b4226});
const GAUGE=3, RH=1.2, SS=12;

function railProfile() {
  const s = new THREE.Shape();
  s.moveTo(-0.4,-0.6); s.lineTo(0.4,-0.6); s.lineTo(0.4,0.6); s.lineTo(-0.4,0.6); s.closePath();
  return s;
}

function addStraight(group, len) {
  const hg=GAUGE/2, prof=railProfile();
  const lp=new THREE.LineCurve3(new THREE.Vector3(0,RH/2,-hg),new THREE.Vector3(len,RH/2,-hg));
  const rp=new THREE.LineCurve3(new THREE.Vector3(0,RH/2,hg),new THREE.Vector3(len,RH/2,hg));
  group.add(new THREE.Mesh(new THREE.ExtrudeGeometry(prof,{steps:2,bevelEnabled:false,extrudePath:lp}),railMat));
  group.add(new THREE.Mesh(new THREE.ExtrudeGeometry(prof,{steps:2,bevelEnabled:false,extrudePath:rp}),railMat));
  const cnt=Math.max(1,Math.floor(len/SS));
  const sg=new THREE.BoxGeometry(1.5,0.6,8);
  for(let i=0;i<cnt;i++){const m=new THREE.Mesh(sg,sleeperMat);m.position.set(((i+0.5)/cnt)*len,0.3,0);group.add(m);}
}

function addCurve(group, radius, angleDeg) {
  const ar=angleDeg*Math.PI/180, hg=GAUGE/2, segs=Math.max(8,Math.ceil(angleDeg/3)), prof=railProfile();
  function mp(r,y){
    const pts=[];
    for(let i=0;i<=segs;i++){const t=(i/segs)*ar;pts.push(new THREE.Vector3(r*Math.sin(t),y,r-r*Math.cos(t)));}
    const cp=new THREE.CurvePath();
    for(let i=0;i<pts.length-1;i++)cp.add(new THREE.LineCurve3(pts[i],pts[i+1]));
    return cp;
  }
  group.add(new THREE.Mesh(new THREE.ExtrudeGeometry(prof,{steps:segs,bevelEnabled:false,extrudePath:mp(radius-hg,RH/2)}),railMat));
  group.add(new THREE.Mesh(new THREE.ExtrudeGeometry(prof,{steps:segs,bevelEnabled:false,extrudePath:mp(radius+hg,RH/2)}),railMat));
  const al=radius*ar, cnt=Math.max(1,Math.floor(al/SS));
  const sg=new THREE.BoxGeometry(1.5,0.6,8);
  for(let i=0;i<cnt;i++){const t=((i+0.5)/cnt)*ar;const m=new THREE.Mesh(sg,sleeperMat);m.position.set(radius*Math.sin(t),0.3,radius-radius*Math.cos(t));m.rotation.y=-t;group.add(m);}
}

function renderTracks(tracks, source) {
  if(trackGroup){scene.remove(trackGroup);}
  trackGroup = new THREE.Group();
  
  let gapCount=0;
  for(let i=0;i<tracks.length;i++){
    const t=tracks[i];
    const g=new THREE.Group();
    
    if(t.type==="straight") addStraight(g, t.length);
    else if(t.type==="curve") addCurve(g, t.radius, t.angle);
    
    g.position.set(t.x, 0, t.z);
    g.rotation.y = t.rotation;
    trackGroup.add(g);
    
    // Green sphere at track origin
    const sph = new THREE.Mesh(new THREE.SphereGeometry(3,8,8), new THREE.MeshBasicMaterial({color:0x00ff00}));
    sph.position.set(t.x, 5, t.z);
    trackGroup.add(sph);
    
    // Check gap to next track
    const next = tracks[(i+1)%tracks.length];
    const cos=Math.cos(t.rotation), sin=Math.sin(t.rotation);
    let endX, endZ;
    if(t.type==="straight"){endX=t.x+t.length*cos;endZ=t.z+t.length*sin;}
    else{const ar=t.angle*Math.PI/180;const lx=t.radius*Math.sin(ar);const lz=t.radius-t.radius*Math.cos(ar);endX=t.x+lx*cos-lz*sin;endZ=t.z+lx*sin+lz*cos;}
    const gap=Math.sqrt((next.x-endX)**2+(next.z-endZ)**2);
    if(gap>0.5) gapCount++;
    
    // Red sphere at end
    const sph2 = new THREE.Mesh(new THREE.SphereGeometry(2,8,8), new THREE.MeshBasicMaterial({color:0xff3300}));
    sph2.position.set(endX, 8, endZ);
    trackGroup.add(sph2);
  }
  
  scene.add(trackGroup);
  document.getElementById('info').innerHTML = `
    <b>Track Debug v2</b><br>
    Source: <b>${source}</b><br>
    Tracks: ${tracks.length}<br>
    Gaps > 0.5mm: <span style="color:${gapCount?'#f33':'#0f0'}">${gapCount}</span><br>
    <small><span style="color:#0f0">●</span> track start &nbsp; <span style="color:#f33">●</span> track end</small><br>
    <small>Red ends should touch green starts of next track</small>
  `;
}

// Load hardcoded template
window.loadTemplate = function() {
  renderTracks(TEMPLATE_TRACKS, 'hardcoded template');
};

// Load from live API
window.loadFromAPI = async function() {
  document.getElementById('info').innerHTML = 'Načítám z API...';
  try {
    const resp = await fetch('/api/generate-track-3d', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({scale:'TT', boardWidth:200, boardDepth:100, character:'station'}),
    });
    const json = await resp.json();
    
    // We need piece metadata - build from pieceId
    const PIECES = {
      'tt-g1':{type:'straight',length:166},'tt-g2':{type:'straight',length:83},'tt-g3':{type:'straight',length:41.5},
      'tt-g4':{type:'straight',length:332},'tt-g5':{type:'straight',length:228},
      'tt-r1-15':{type:'curve',radius:310,angle:15},'tt-r1-30':{type:'curve',radius:310,angle:30},
      'tt-r2-15':{type:'curve',radius:353,angle:15},'tt-r2-30':{type:'curve',radius:353,angle:30},
      'tt-r3-15':{type:'curve',radius:396,angle:15},
      'tt-ewl':{type:'turnout',length:166,radius:310,angle:15,direction:'left'},
      'tt-ewr':{type:'turnout',length:166,radius:310,angle:15,direction:'right'},
      'h0-g230':{type:'straight',length:230},'h0-g200':{type:'straight',length:200},'h0-g100':{type:'straight',length:100},
      'h0-g345':{type:'straight',length:345},
      'h0-r2-30':{type:'curve',radius:358,angle:30},'h0-r3-30':{type:'curve',radius:434.5,angle:30},
      'h0-r2-15':{type:'curve',radius:358,angle:15},'h0-r3-15':{type:'curve',radius:434.5,angle:15},
      'h0-wl15':{type:'turnout',length:230,radius:358,angle:15,direction:'left'},
      'h0-wr15':{type:'turnout',length:230,radius:358,angle:15,direction:'right'},
    };
    
    const tracks = json.tracks.map(t => {
      const def = PIECES[t.pieceId] || {type:'straight',length:100};
      return { ...def, x: t.x, z: t.z, rotation: t.rotation, pieceId: t.pieceId };
    });
    
    renderTracks(tracks, `API (${json.source}, gap:${json.loopGapMm?.toFixed(2)||'?'}mm)`);
  } catch(e) {
    document.getElementById('info').innerHTML = 'Error: '+e.message;
  }
};

init();
// Auto-load template on start
window.loadTemplate();
</script>
</body>
</html>
