</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls;
let trackGroup = null;
const boardW = 2000, boardD = 1000;

// Hardcoded simple-oval TT template (32 tracks, verified 0mm gap)
const TEMPLATE_TRACKS = [

  {pieceId:"tt-r1-15",x:1664,z:190,rotation:0,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1744.234,z:200.563,rotation:0.2618,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1819.0,z:231.453,rotation:0.5236,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1883.234,z:280.765,rotation:0.7854,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1932.547,z:345.0,rotation:1.0472,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1963.437,z:419.766,rotation:1.3090,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1974.0,z:500.0,rotation:1.5708,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1963.437,z:580.234,rotation:1.8326,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1932.547,z:655.0,rotation:2.0944,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1883.234,z:719.235,rotation:2.3562,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1819.0,z:768.547,rotation:2.6180,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:1744.234,z:799.437,rotation:2.8798,type:"curve",radius:310,angle:15},
  {pieceId:"tt-g4",x:1664.0,z:810.0,rotation:3.1416,type:"straight",length:332},

  {pieceId:"tt-g4",x:1000.0,z:810.0,rotation:3.1416,type:"straight",length:332},

  {pieceId:"tt-r1-15",x:255.766,z:799.437,rotation:3.4034,type:"curve",radius:310,angle:15},

  {pieceId:"tt-r1-15",x:67.453,z:655.0,rotation:4.1888,type:"curve",radius:310,angle:15},

  {pieceId:"tt-r1-15",x:26.0,z:500.0,rotation:4.7124,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:36.563,z:419.766,rotation:4.9742,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:67.453,z:345.0,rotation:5.2360,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:116.766,z:280.765,rotation:5.4978,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:181.0,z:231.453,rotation:5.7596,type:"curve",radius:310,angle:15},
  {pieceId:"tt-r1-15",x:255.766,z:200.563,rotation:6.0214,type:"curve",radius:310,angle:15},
];

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0b14);
  camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 10000);
  camera.position.set(boardW/2, Math.max(boardW,boardD)*0.8, boardD*1.5);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(boardW/2, 0, boardD/2);
  controls.update();
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(boardW, 500, boardD);
  scene.add(dl);
  const dl2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dl2.position.set(-200, 300, -200);
  scene.add(dl2);
  // Board
  const bg = new THREE.BoxGeometry(boardW, 5, boardD);
  const bm = new THREE.MeshStandardMaterial({color:0x2a5a2a});
  const board = new THREE.Mesh(bg, bm);
  board.position.set(boardW/2, -2.5, boardD/2);
  scene.add(board);
  animate();
  window.addEventListener('resize', () => {
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

const railMat = new THREE.MeshStandardMaterial({color:0xc0c0c0, metalness:0.7, roughness:0.3});
const sleeperMat = new THREE.MeshStandardMaterial({color:0x6b4226});
const GAUGE=3, RH=1.2, SS=12;

// ============================================================
// FIXED: Manual sweep geometry (no ExtrudeGeometry for curves!)
// ExtrudeGeometry uses Frenet frames which tilt the rail profile
// on XZ-plane curves. We build geometry manually with Y-up.
// ============================================================

/** Build a straight rail as a simple box */
function buildStraightRail(length, zOffset) {
  const geo = new THREE.BoxGeometry(length, RH, 0.8);
  geo.translate(length/2, RH/2, zOffset);
  return geo;
}

/** Build curved rail by sweeping small quads along the arc, keeping profile vertical */
function buildCurvedRail(radius, angleDeg, rOffset) {
  const angleRad = angleDeg * Math.PI / 180;
  const r = radius + rOffset; // inner or outer rail
  const segments = Math.max(12, Math.ceil(angleDeg / 2));
  
  const positions = [];
  const normals = [];
  const indices = [];
  
  const hw = 0.4; // half rail width
  const hh = RH / 2;
  
  for (let i = 0; i <= segments; i++) {
    const t = (i / segments) * angleRad;
    // Center of rail at this angle
    const cx = r * Math.sin(t);
    const cz = r - r * Math.cos(t);
    // Tangent direction (normalized) in XZ
    const tx = Math.cos(t);
    const tz = Math.sin(t);
    // Normal direction (perpendicular to tangent, pointing outward) in XZ
    const nx = -tz; // sin(t)... actually for outward normal: (sin(t), 0, -cos(t)) rotated... 
    // For a circle centered at (0, 0, R): outward normal at angle t = (sin(t), 0, -(cos(t) - 1)... no.
    // Simpler: radial direction from center (0,0,R) to point is (sin(t), 0, -cos(t))
    // That IS the outward normal for the rail cross-section lateral direction.
    const rnx = Math.sin(t);
    const rnz = -Math.cos(t);
    
    // 4 vertices per cross-section (rectangular profile):
    // Bottom-left, bottom-right, top-right, top-left (looking along tangent)
    // "left/right" = along radial normal
    const baseIdx = i * 4;
    
    // BL
    positions.push(cx + rnx * (-hw), 0,        cz + rnz * (-hw));
    normals.push(0, -1, 0);
    // BR  
    positions.push(cx + rnx * hw,    0,        cz + rnz * hw);
    normals.push(0, -1, 0);
    // TR
    positions.push(cx + rnx * hw,    RH,       cz + rnz * hw);
    normals.push(0, 1, 0);
    // TL
    positions.push(cx + rnx * (-hw), RH,       cz + rnz * (-hw));
    normals.push(0, 1, 0);
    
    if (i < segments) {
      const ni = (i + 1) * 4;
      // Front face (2 triangles)
      indices.push(baseIdx, ni, ni+1,  baseIdx, ni+1, baseIdx+1);
      // Back face
      indices.push(baseIdx+3, baseIdx+2, ni+2,  baseIdx+3, ni+2, ni+3);
      // Top face
      indices.push(baseIdx+2, baseIdx+3, ni+3,  baseIdx+2, ni+3, ni+2); // wait this is wrong
      // Let me redo: for each segment, connect 4 verts to next 4 verts
      // Bottom: baseIdx+0, baseIdx+1, ni+1, ni+0
      // Top: baseIdx+3, baseIdx+2, ni+2, ni+3
      // Outer: baseIdx+1, baseIdx+2, ni+2, ni+1
      // Inner: baseIdx+0, baseIdx+3, ni+3, ni+0
    }
  }
  
  // Redo indices properly
  indices.length = 0;
  for (let i = 0; i < segments; i++) {
    const a = i * 4;
    const b = (i+1) * 4;
    // Bottom face (BL, BR of current → BR, BL of next)
    indices.push(a+0, a+1, b+1,  a+0, b+1, b+0);
    // Top face (TL, TR of current → TR, TL of next)
    indices.push(a+3, b+3, b+2,  a+3, b+2, a+2);
    // Outer face (BR, TR of current → TR, BR of next)
    indices.push(a+1, a+2, b+2,  a+1, b+2, b+1);
    // Inner face (BL, TL of current → TL, BL of next)
    indices.push(a+0, b+0, b+3,  a+0, b+3, a+3);
  }
  
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals(); // proper normals
  return geo;
}

function addStraight(group, len) {
  const hg = GAUGE/2;
  group.add(new THREE.Mesh(buildStraightRail(len, -hg), railMat));
  group.add(new THREE.Mesh(buildStraightRail(len, hg), railMat));
  // Sleepers
  const cnt = Math.max(1, Math.floor(len/SS));
  const sg = new THREE.BoxGeometry(1.5, 0.6, 8);
  for(let i=0;i<cnt;i++){
    const m = new THREE.Mesh(sg, sleeperMat);
    m.position.set(((i+0.5)/cnt)*len, 0.3, 0);
    group.add(m);
  }
}

function addCurve(group, radius, angleDeg) {
  const hg = GAUGE/2;
  // Inner rail (radius - half gauge), outer rail (radius + half gauge)
  group.add(new THREE.Mesh(buildCurvedRail(radius, angleDeg, -hg), railMat));
  group.add(new THREE.Mesh(buildCurvedRail(radius, angleDeg, hg), railMat));
  // Sleepers along the curve
  const ar = angleDeg * Math.PI / 180;
  const arcLen = radius * ar;
  const cnt = Math.max(1, Math.floor(arcLen/SS));
  const sg = new THREE.BoxGeometry(1.5, 0.6, 8);
  for(let i=0;i<cnt;i++){
    const t = ((i+0.5)/cnt) * ar;
    const m = new THREE.Mesh(sg, sleeperMat);
    m.position.set(radius*Math.sin(t), 0.3, radius-radius*Math.cos(t));
    m.rotation.y = -t;
    group.add(m);
  }
}

function renderTracks(tracks, source) {
  if(trackGroup){scene.remove(trackGroup);}
  trackGroup = new THREE.Group();
  
  let gapCount=0;
  for(let i=0;i<tracks.length;i++){
    const t=tracks[i];
    const g=new THREE.Group();
    
    if(t.type==="straight"||t.type==="turnout") addStraight(g, t.length||166);
    else if(t.type==="curve") addCurve(g, t.radius, t.angle);
    
    g.position.set(t.x, 0, t.z);
    g.rotation.y = -t.rotation;
    trackGroup.add(g);
    
    // Check gap to next track
    const next = tracks[(i+1)%tracks.length];
    const cos=Math.cos(t.rotation), sin=Math.sin(t.rotation);
    let endX, endZ;
    if(t.type==="straight"||t.type==="turnout"){const l=t.length||166;endX=t.x+l*cos;endZ=t.z+l*sin;}
    else{const ar=t.angle*Math.PI/180;const lx=t.radius*Math.sin(ar);const lz=t.radius-t.radius*Math.cos(ar);endX=t.x+lx*cos-lz*sin;endZ=t.z+lx*sin+lz*cos;}
    const gap=Math.sqrt((next.x-endX)**2+(next.z-endZ)**2);
    if(gap>0.5) gapCount++;
  }
  
  scene.add(trackGroup);
  document.getElementById('info').innerHTML = `
    <b>Track Debug v3 (fixed geometry)</b><br>
    Source: <b>${source}</b><br>
    Tracks: ${tracks.length}<br>
    Gaps > 0.5mm: <span style="color:${gapCount?'#f33':'#0f0'}">${gapCount}</span><br>
    <small>Curves now use manual sweep (no ExtrudeGeometry)</small>
  `;
}

window.loadTemplate = function() { renderTracks(TEMPLATE_TRACKS, 'hardcoded template'); };

window.loadFromAPI = async function() {
  document.getElementById('info').innerHTML = 'Načítám z API...';
  try {
    const resp = await fetch('/api/generate-track-3d', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({scale:'TT',boardWidth:200,boardDepth:100,character:'station'}),
    });
    const json = await resp.json();
    const PIECES = {
      'tt-g1':{type:'straight',length:166},'tt-g2':{type:'straight',length:83},'tt-g3':{type:'straight',length:41.5},
      'tt-g4':{type:'straight',length:332},'tt-g5':{type:'straight',length:228},
      'tt-r1-15':{type:'curve',radius:310,angle:15},'tt-r1-30':{type:'curve',radius:310,angle:30},
      'tt-r2-15':{type:'curve',radius:353,angle:15},'tt-r2-30':{type:'curve',radius:353,angle:30},
      'tt-r3-15':{type:'curve',radius:396,angle:15},
      'tt-ewl':{type:'turnout',length:166,radius:310,angle:15,direction:'left'},
      'tt-ewr':{type:'turnout',length:166,radius:310,angle:15,direction:'right'},
    };
    const tracks = json.tracks.map(t => ({...(PIECES[t.pieceId]||{type:'straight',length:100}), x:t.x, z:t.z, rotation:t.rotation, pieceId:t.pieceId}));
    renderTracks(tracks, `API (${json.source}, gap:${json.loopGapMm?.toFixed(2)||'?'}mm)`);
  } catch(e) { document.getElementById('info').innerHTML='Error: '+e.message; }
};

init();
window.loadTemplate();

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
</script>
